# Copy to ~/.config/storitad/config.yml and edit for your paths.

archive_root: ~/journal
staging: ~/journal/.staging

# whisper.cpp CLI binary. Nix flake provides `whisper-cli` on $PATH, so the
# default works in the devshell.
whisper_bin: whisper-cli

# Path to a ggml model. Download once with e.g.
#   curl -L -o ~/models/ggml-small.en.bin \
#     https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin
whisper_model: ~/models/ggml-small.en.bin
whisper_model_name: whisper-small.en

transport: adb

# After a successful sync, what to do with items on the phone:
#   remove_media — keep the sidecar JSON (pushed back with processed=true so
#                  the phone archives it), delete only the media blob (default)
#   remove_all   — delete media + sidecar from the phone immediately
#   quota        — keep media + sidecar on phone until total inbox > quota_gb,
#                  then delete oldest already-synced items; buys you offline
#                  replay on-device while still capping phone storage
cleanup:
  mode: remove_media
  quota_gb: 5

aliases_file: ~/.config/storitad/aliases.yml

# Optional overrides for recipient emoji in the rendered site.
# Defaults come from app/src/main/assets/recipients.json.
# recipient_emoji:
#   boyfriend: 💙
